name: Build
on: push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Install SDK
      run: |
        curl -sLo /tmp/cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        sudo mkdir -p /opt/android
        sudo unzip -q /tmp/cmdline-tools.zip -d /opt/android/
        sudo mv /opt/android/cmdline-tools /opt/android/latest
        export ANDROID_SDK_ROOT=/opt/android/latest
        export PATH=$ANDROID_SDK_ROOT/bin:$PATH
        yes | $ANDROID_SDK_ROOT/bin/sdkmanager --licenses > /dev/null 2>&1 || true
        $ANDROID_SDK_ROOT/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1
        
    - name: Build APK
      run: |
        export ANDROID_SDK_ROOT=/opt/android/latest
        curl -sLo /tmp/gradle.zip https://services.gradle.org/distributions/gradle-8.5-bin.zip
        unzip -q /tmp/gradle.zip -d /tmp/
        /tmp/gradle-8.5/bin/gradle assembleRelease --no-daemon -p $GITHUB_WORKSPACE
    
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: RouterTool-APK
        path: app/build/outputs/apk/release/*.apk
