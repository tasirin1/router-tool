name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          gradle-
          
    - name: Generate Gradle Wrapper
      run: |
        cd ${{ github.workspace }}
        # Download gradle wrapper jar
        curl -sL "https://github.com/gradle/gradle/raw/v8.5.0/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar 2>/dev/null || true
        # If that fails, use gradle directly
        if [ ! -f gradle/wrapper/gradle-wrapper.jar ] || [ ! -s gradle/wrapper/gradle-wrapper.jar ]; then
          echo "Downloading gradle to generate wrapper..."
          cd /tmp
          curl -sL "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -o gradle.zip
          unzip -q gradle.zip
          cd ${{ github.workspace }}
          /tmp/gradle-8.5/bin/gradle wrapper --gradle-version 8.5
        fi
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build with Gradle
      run: ./gradlew assembleRelease
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: RouterTool-APK
        path: app/build/outputs/apk/release/*.apk
        if-no-files-found: warn
