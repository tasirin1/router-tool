name: Build APK

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Build
      run: |
        export ANDROID_HOME=/usr/local/lib/android/sdk
        ./gradlew assembleRelease || true
        # If gradlew fails, download gradle directly
        if [ ! -f app/build/outputs/apk/release/*.apk ]; then
          curl -sLo /tmp/gradle.zip https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          /tmp/gradle-8.5/bin/gradle assembleRelease --no-daemon
        fi

    - name: Upload
      uses: actions/upload-artifact@v3
      with:
        name: RouterTool-APK
        path: app/build/outputs/apk/release/*.apk
